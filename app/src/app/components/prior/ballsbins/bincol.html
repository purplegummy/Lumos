<div class="bin-column">

  <!-- each row is one ball slot; drag across to set count quickly -->
  <div class="grid">
    <div
      *ngFor="let row of rows"
      class="cell"
      [class.filled]="isFilled(row)"
      [class.clickable]="isClickable(row)"
      [class.unreachable]="!isClickable(row)"
      (mousedown)="onMouseDown(row)"
      (mouseenter)="onMouseEnter(row)"
    ></div>
  </div>

  <div class="bin-floor"></div>

  <!-- hold to repeat; count rolls up/down to show direction -->
  <div class="controls">
    <button (mousedown)="startHold('decrement')" (mouseup)="stopHold()" (mouseleave)="stopHold()" [disabled]="count === 0" [class.is-held]="isHeld === 'decrement'">−</button>
    <span class="count">{{ count }}</span>
    <button (mousedown)="startHold('increment')" (mouseup)="stopHold()" (mouseleave)="stopHold()" [disabled]="remaining === 0" [class.is-held]="isHeld === 'increment'">+</button>
  </div>

  <div class="label">{{ bin.label }}</div>
</div>

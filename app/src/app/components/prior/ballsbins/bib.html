<div class="balls-into-bins" [class.categorical]="fixedBins.length > 0">
  <div class="grid" [class.categorical]="fixedBins.length > 0">
    <app-bin-column
      *ngFor="let bin of bins; let i = index"
      [bin]="bin"
      [count]="counts[i]"
      [maxBalls]="binningService.ballCount"
      [remaining]="getRemaining()"
      (increment)="increment(i)"
      (decrement)="decrement(i)"
      (setCount)="setCount(i, $event)"
    ></app-bin-column>
  </div>
</div>

<div class="modal-backdrop">
  <div class="modal-panel">

    <!-- header -->
    <div class="modal-header">
      <div class="modal-header-left">
        <div *ngIf="!selectedAttribute">
          <div class="modal-title">Prior Beliefs · <span class="modal-title-attr">{{ datasetId }}</span></div>
          <div class="modal-subtitle">Pick an attribute to distribute your beliefs.</div>
        </div>
        <div *ngIf="selectedAttribute">
          <div class="modal-title">
            Distribute your beliefs for <span class="modal-title-attr">{{ selectedAttribute }}</span>
          </div>
          <div class="modal-subtitle">Place all {{ binningService.ballCount }} balls into the bins below.</div>
        </div>
      </div>

      <div *ngIf="selectedAttribute" class="modal-balls-counter" [class.complete]="remaining === 0">
        <span class="modal-balls-count">{{ remaining }}</span>
        <span class="modal-balls-label">balls left</span>
      </div>

      <button class="modal-close" (click)="close()">✕</button>
    </div>


    <div class="modal-body">

      <!-- attribute picker -->
      <div *ngIf="!selectedAttribute">
        <ul class="attribute-list">
          <li
            *ngFor="let attr of attributes"
            (click)="selectAttribute(attr)"
            class="attribute-item"
            [class.done]="hasPrior(attr)"
          >
            <span *ngIf="hasPrior(attr)">✓ </span>{{ attr }}
          </li>
        </ul>
      </div>

      <!--  balls and bins ui -->
      <div *ngIf="selectedAttribute">
        <div class="histogram-box">
          <app-balls-into-bins
            [values]="currentValues"
            [initialCounts]="draftCounts"
            (countsChange)="onCountsChange($event)"
          ></app-balls-into-bins>
        </div>
      </div>

    </div>

    <!-- footer -->
    <div class="modal-footer">
      <button *ngIf="selectedAttribute" (click)="selectedAttribute = null">Back</button>
      <button *ngIf="!selectedAttribute" (click)="close()">Cancel</button>
      <button *ngIf="selectedAttribute" class="primary" (click)="save()" [disabled]="remaining > 0">Save & continue</button>
    </div>

  </div>
</div>
